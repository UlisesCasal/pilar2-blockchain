# Helm Chart: Environment Variables Mapping Example
# To be included in templates/coordinator/deployment.yaml

          env:
            - name: RABBITMQ_URL
              value: {{ .Values.rabbitmq.url | quote }}
            - name: REDIS_URL
              value: {{ .Values.redis.url | quote }}
            - name: DIFFICULTY
              value: {{ .Values.difficulty | default "0000" | quote }}
            - name: POOL_URL
              value: {{ .Values.pool.url | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | default "info" | quote }}
