# Ajuste general: Liveness/Readiness Probes (Simulación del patrón para el resto)
# Aplicaremos este bloque a todos los templates de deployment

livenessProbe:
  tcpSocket:
    port: {{ .Values.service.port }}
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  tcpSocket:
    port: {{ .Values.service.port }}
  initialDelaySeconds: 5
  periodSeconds: 10
