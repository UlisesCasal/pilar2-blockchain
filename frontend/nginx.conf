server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/coordinator/ {
        set $coordinator_upstream coordinator;
        rewrite ^/api/coordinator/(.*) /$1 break;
        proxy_pass http://$coordinator_upstream:3000;
    }

    location /api/pool/ {
        set $pool_upstream pool;
        rewrite ^/api/pool/(.*) /$1 break;
        proxy_pass http://$pool_upstream:3001;
    }
}
