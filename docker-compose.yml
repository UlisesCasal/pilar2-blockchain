version: '3.8'

networks:
  blockchain:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - blockchain
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    networks:
      - blockchain
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  validator:
    build: .
    environment:
      SERVICE: validator

      PORT_VALIDATOR: 3003
      LOG_LEVEL: info
    volumes:
      - "./logs:/app/logs"
      - ./keys:/app/keys:ro
    networks:
      - blockchain
    deploy:
      replicas: 2

  coordinator:
    build: .
    environment:
      SERVICE: coordinator
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_URL: redis://redis:6379

      DIFFICULTY: ${DIFFICULTY:-0000}
      POOL_URL: http://pool:3001
      PORT_COORDINATOR: 3000
      LOG_LEVEL: info
    volumes:
      - "./logs:/app/logs"
    networks:
      - blockchain
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2

  pool:
    build: .
    environment:
      SERVICE: pool
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

      BLOCK_THRESHOLD: ${BLOCK_THRESHOLD:-10}
      COORDINATOR_URL: http://coordinator:3000
      WORKER_TTL_MS: 30000
      PORT_POOL: 3001
      LOG_LEVEL: info
    volumes:
      - "./logs:/app/logs"
      - ./keys:/app/keys:ro
    ports:
      - "3001:3001"
    networks:
      - blockchain
    depends_on:
      rabbitmq:
        condition: service_healthy
      coordinator:
        condition: service_started

  worker:
    build: .
    environment:
      SERVICE: worker
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672

      PILAR1_CPU_BINARY: ./tpi/pilar1/Hit7/CPU/pow_cpu_range.js
      PILAR1_GPU_BINARY: ./tpi/pilar1/Hit7/GPU/pow_gpu_range
      WORKER_TYPE: CPU
      KEEPALIVE_INTERVAL_MS: 10000
      PORT_WORKER: 3002
      LOG_LEVEL: info
    volumes:
      - "./logs:/app/logs"
    networks:
      - blockchain
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      replicas: 2

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    networks:
      - blockchain
    depends_on:
      coordinator:
        condition: service_started
      pool:
        condition: service_started
